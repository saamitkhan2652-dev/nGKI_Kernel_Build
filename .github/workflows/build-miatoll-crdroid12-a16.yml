name: Build Miatoll Kernel (crDroid 12.0 A16)

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

      - name: Clone Toolchain
        run: |
          git clone --depth=1 -b master-kernel-build-2024 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 $GITHUB_WORKSPACE/clang
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 -b 16.0 https://github.com/crdroidandroid/android_kernel_xiaomi_sm6250 $GITHUB_WORKSPACE/kernel

      - name: Setup KernelSU & SUSFS
        run: |
          cd $GITHUB_WORKSPACE/kernel
          # Download and apply KernelSU-Next or standard KernelSU
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s next
          # Fetch and apply SUSFS patches for 4.14 kernel
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b kernel-4.14 $GITHUB_WORKSPACE/susfs
          cp $GITHUB_WORKSPACE/susfs/Kernel_Patches/KernelSU/10_enable_susfs_for_ksu.patch ./KernelSU/
          patch -p1 < $GITHUB_WORKSPACE/susfs/Kernel_Patches/50_add_susfs_in_kernel-4.14.patch

      - name: Compile Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel
          export ARCH=arm64
          export SUBARCH=arm64
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          make O=out miatoll_defconfig
          make -j$(nproc --all) O=out \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: miatoll-A16-kernel-Image.gz-dtb
          path: kernel/out/arch/arm64/boot/Image.gz-dtb
